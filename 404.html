<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Mirror Frame Studio</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🪞</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;background:#0a1a2e;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:24px}
.container{max-width:480px}
.mirror-emoji{font-size:5rem;margin-bottom:20px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
h1{font-size:4rem;font-weight:800;color:#C8A84B;margin-bottom:8px}
p{font-size:1.1rem;color:rgba(255,255,255,.65);line-height:1.7;margin-bottom:32px}
.btn{display:inline-block;padding:14px 36px;background:linear-gradient(135deg,#C8A84B,#d4b85e);color:#0F2540;font-weight:700;font-size:1rem;text-decoration:none;border-radius:50px;transition:all .3s}
.btn:hover{transform:translateY(-2px);box-shadow:0 4px 20px rgba(200,168,75,.5)}
</style>
</head>
<body>
<div class="container">
  <div class="mirror-emoji">🪞</div>
  <h1>404</h1>
  <p>אופס, העמוד הזה לא נמצא.<br>אולי המראה שיקפה אותך למקום הלא נכון 😉</p>
  <a href="./" class="btn">חזרה לדף הבית</a>
</div>
</body>
</html>
