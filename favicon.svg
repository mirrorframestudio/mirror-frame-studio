<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Outer frame - gold -->
  <rect x="2" y="2" width="28" height="28" rx="3" ry="3" fill="none" stroke="#C8A84B" stroke-width="2.5"/>
  <!-- Inner frame - gold, thinner -->
  <rect x="6" y="6" width="20" height="20" rx="1.5" ry="1.5" fill="none" stroke="#C8A84B" stroke-width="1.2"/>
  <!-- Mirror glass - navy with slight gradient feel -->
  <rect x="8" y="8" width="16" height="16" rx="1" ry="1" fill="#0F2540"/>
  <!-- Mirror reflection highlight -->
  <path d="M10 10 L18 10 L10 18 Z" fill="#1a3a5c" opacity="0.6"/>
  <!-- Small shine accent -->
  <circle cx="12" cy="12" r="1.2" fill="#C8A84B" opacity="0.5"/>
</svg>
